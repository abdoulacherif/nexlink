<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexLink · Inscription</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--bg2:#0a0a0f;--card:#0d0d1a;--card2:#111120;
  --border:#1a1a2e;--border2:#252540;
  --neon:#00b4ff;--neon2:#0088ff;--neon-g:rgba(0,180,255,0.1);
  --orange:#ff6b00;--orange2:#ff8c00;--orange-g:rgba(255,107,0,0.1);
  --white:#fff;--muted:#6b7280;--muted2:#374151;
  --success:#00ff88;--danger:#ff3366;--yellow:#fbbf24;
  --r:12px;--rs:8px;
}
html,body{min-height:100%;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--white)}
a{text-decoration:none;color:inherit}
input,textarea,select,button{font-family:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#252540;border-radius:2px}

.page{
  min-height:100vh;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  padding:24px;position:relative;overflow:hidden;
}
.page::before{
  content:'';position:absolute;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,180,255,.07) 0%,transparent 70%);
  top:-200px;left:-200px;pointer-events:none;
}
.page::after{
  content:'';position:absolute;width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,107,0,.06) 0%,transparent 70%);
  bottom:-150px;right:-150px;pointer-events:none;
}

.box{
  background:var(--card);border:1px solid var(--border2);
  border-radius:18px;padding:32px 28px;width:100%;max-width:500px;
  position:relative;z-index:1;
}
.box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  border-radius:18px 18px 0 0;
  background:linear-gradient(90deg,var(--neon),var(--orange));
}

/* LOGO */
.logo{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.logo-mark{
  width:42px;height:42px;border-radius:12px;flex-shrink:0;
  background:linear-gradient(135deg,var(--neon2),var(--orange));
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;font-weight:900;color:#000;
  box-shadow:0 0 20px rgba(0,180,255,.2);
}
.logo-text{font-size:1.3rem;font-weight:900;letter-spacing:-0.5px}
.logo-text .a{color:var(--neon)}

.title{font-size:1.5rem;font-weight:900;margin-bottom:6px;letter-spacing:-0.5px}
.sub{font-size:.85rem;color:var(--muted);margin-bottom:24px}

/* FORM */
.form{display:flex;flex-direction:column;gap:14px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fgroup{display:flex;flex-direction:column;gap:6px}
.fgroup label{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.fgroup input,.fgroup textarea,.fgroup select{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--rs);padding:11px 14px;
  color:var(--white);font-size:.875rem;outline:none;
  transition:border-color .15s,box-shadow .15s;width:100%;
}
.fgroup input::placeholder,.fgroup textarea::placeholder{color:var(--muted2)}
.fgroup input:focus,.fgroup textarea:focus{
  border-color:var(--neon);
  box-shadow:0 0 0 3px rgba(0,180,255,.1);
}
.fgroup textarea{min-height:80px;resize:vertical;line-height:1.5}

/* SECTION TITLE */
.stitle{
  font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;
  color:var(--muted);display:flex;align-items:center;gap:8px;
}
.stitle::after{content:'';flex:1;height:1px;background:var(--border2)}

/* PLAN GRID */
.plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.plan-opt{
  background:var(--card2);border:1.5px solid var(--border2);
  border-radius:var(--rs);padding:13px;cursor:pointer;transition:all .15s;
}
.plan-opt:hover{border-color:var(--border2);background:var(--card2)}
.plan-opt.sel{border-color:var(--neon);background:rgba(0,180,255,.06)}
.plan-opt input{display:none}
.plan-tier{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.plan-price{font-size:1.15rem;font-weight:900;letter-spacing:-0.3px;margin-bottom:3px}
.plan-limit{font-size:.7rem;color:var(--muted)}

/* BUTTON */
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:13px;border-radius:var(--rs);font-size:.9rem;font-weight:700;
  cursor:pointer;border:none;transition:all .15s;width:100%;
}
.btn-orange{
  background:linear-gradient(135deg,var(--orange),var(--orange2));
  color:#fff;box-shadow:0 0 20px rgba(255,107,0,.2);
}
.btn-orange:hover{box-shadow:0 0 30px rgba(255,107,0,.35);opacity:.95}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ERROR */
.err-box{
  background:rgba(255,51,102,.08);border:1px solid rgba(255,51,102,.25);
  border-radius:var(--rs);padding:11px 14px;font-size:.82rem;color:var(--danger);
  display:none;
}

/* FOOTER LINK */
.footer-link{text-align:center;font-size:.8rem;color:var(--muted);margin-top:4px}
.footer-link a{color:var(--neon);font-weight:600}
.footer-link a:hover{text-decoration:underline}

/* TOAST */
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--card2);border:1px solid var(--border2);
  border-radius:10px;padding:10px 22px;font-size:.83rem;
  opacity:0;transition:opacity .2s;pointer-events:none;z-index:99;
  box-shadow:0 8px 32px rgba(0,0,0,.6);white-space:nowrap;
}

@media(max-width:500px){
  .frow{grid-template-columns:1fr}
  .box{padding:24px 18px}
}
</style>
</head>
<body>
<div class="page">
  <div class="box">
    <div class="logo">
      <div class="logo-mark">N</div>
      <div class="logo-text">Nex<span class="a">Link</span></div>
    </div>
    <div class="title">Créez votre compte</div>
    <div class="sub">Plateforme d'email marketing pour l'Afrique francophone 🌍</div>

    <form class="form" id="regForm">
      <div class="frow">
        <div class="fgroup">
          <label>Nom complet *</label>
          <input type="text" id="name" placeholder="Jean Dupont" required>
        </div>
        <div class="fgroup">
          <label>WhatsApp *</label>
          <input type="tel" id="whatsapp" placeholder="+237 6XX XXX XXX" required>
        </div>
      </div>

      <div class="fgroup">
        <label>Email *</label>
        <input type="email" id="email" placeholder="vous@email.com" required>
      </div>

      <div class="frow">
        <div class="fgroup">
          <label>Mot de passe *</label>
          <input type="password" id="password" placeholder="Min. 6 caractères" required>
        </div>
        <div class="fgroup">
          <label>Confirmer *</label>
          <input type="password" id="password2" placeholder="Répétez" required>
        </div>
      </div>

      <div class="fgroup">
        <label>Pourquoi souhaitez-vous utiliser NexLink ? *</label>
        <textarea id="reason" placeholder="Décrivez votre activité et votre besoin en email marketing…" required></textarea>
      </div>

      <div>
        <div class="stitle" style="margin-bottom:10px">Choisissez votre plan</div>
        <div class="plan-grid" id="planGrid">
          {% for key, p in plans.items() %}
          <label class="plan-opt {% if key=='free' %}sel{% endif %}" data-key="{{ key }}">
            <input type="radio" name="plan" value="{{ key }}" {% if key=='free' %}checked{% endif %}>
            <div class="plan-tier" style="
              {% if key=='free' %}color:var(--muted)
              {% elif key=='starter' %}color:var(--neon)
              {% elif key=='business' %}color:var(--orange)
              {% else %}color:var(--yellow){% endif %}">
              {{ p.name }}
            </div>
            <div class="plan-price" style="
              {% if key=='free' %}color:var(--muted)
              {% elif key=='starter' %}color:var(--neon)
              {% elif key=='business' %}color:var(--orange)
              {% else %}color:var(--yellow){% endif %}">
              {% if p.price == 0 %}Gratuit{% else %}{{ "{:,}".format(p.price)|replace(',',' ') }} F{% endif %}
              {% if p.price > 0 %}<span style="font-size:.7rem;color:var(--muted);font-weight:400">/mois</span>{% endif %}
            </div>
            <div class="plan-limit">
              {% if p.emails_per_day == -1 %}Illimité{% else %}{{ p.emails_per_day }} emails/jour{% endif %}
            </div>
          </label>
          {% endfor %}
        </div>
      </div>

      <div class="err-box" id="errBox"></div>

      <button type="submit" class="btn btn-orange" id="submitBtn">
        🚀 Créer mon compte
      </button>

      <div class="footer-link">
        Déjà inscrit ? <a href="/login">Se connecter</a>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Plan selector
document.querySelectorAll('.plan-opt').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.plan-opt').forEach(p => p.classList.remove('sel'));
    el.classList.add('sel');
    el.querySelector('input').checked = true;
  });
});

function toast(msg, dur=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.style.opacity = '0', dur);
}

document.getElementById('regForm').addEventListener('submit', async e => {
  e.preventDefault();
  const err = document.getElementById('errBox');
  err.style.display = 'none';
  const name = document.getElementById('name').value.trim();
  const whatsapp = document.getElementById('whatsapp').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const password2 = document.getElementById('password2').value;
  const reason = document.getElementById('reason').value.trim();
  const plan = document.querySelector('input[name="plan"]:checked')?.value || 'free';

  if (password !== password2) {
    err.textContent = '❌ Les mots de passe ne correspondent pas';
    err.style.display = 'block'; return;
  }
  if (password.length < 6) {
    err.textContent = '❌ Mot de passe trop court (min. 6 caractères)';
    err.style.display = 'block'; return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '⏳ Création en cours…';

  try {
    const r = await fetch('/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name, whatsapp, email, password, reason, plan})
    });
    const data = await r.json();
    if (data.error) {
      err.textContent = '❌ ' + data.error;
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = '🚀 Créer mon compte';
      return;
    }
    toast('✅ Compte créé ! Redirection…');
    setTimeout(() => window.location.href = data.redirect || '/waiting', 800);
  } catch(e) {
    err.textContent = '❌ Erreur réseau. Réessayez.';
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = '🚀 Créer mon compte';
  }
});
</script>
</body>
</html>
