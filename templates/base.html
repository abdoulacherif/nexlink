<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexLink · {% block title %}{% endblock %}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--bg2:#0a0a0f;--card:#0d0d1a;--card2:#111120;
  --border:#1a1a2e;--border2:#252540;
  --neon:#00b4ff;--neon2:#0088ff;--neon-g:rgba(0,180,255,.08);
  --orange:#ff6b00;--orange2:#ff8c00;--orange-g:rgba(255,107,0,.08);
  --white:#fff;--white2:#e8eaff;--muted:#6b7280;--muted2:#374151;
  --success:#00ff88;--danger:#ff3366;--yellow:#fbbf24;
  --r:12px;--rs:8px;
}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--white)}
a{text-decoration:none;color:inherit}
input,textarea,select,button{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.app-layout{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── HEADER TOP ── */
.app-header{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:14px 20px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;position:relative;
}
.app-header::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--neon),var(--orange));
}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{
  width:38px;height:38px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--neon2),var(--orange));
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;font-weight:900;color:#000;
  box-shadow:0 0 16px rgba(0,180,255,.2);
}
.brand-text{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:900;letter-spacing:.5px;color:var(--white)}
.brand-text .a{color:var(--neon)}
.header-right{display:flex;align-items:center;gap:10px}
.plan-badge{
  font-size:.7rem;font-weight:800;padding:5px 13px;border-radius:20px;
  text-transform:uppercase;letter-spacing:.5px;
}
.p-free{background:rgba(107,114,128,.15);color:var(--muted);border:1px solid rgba(107,114,128,.25)}
.p-starter{background:rgba(0,180,255,.12);color:var(--neon);border:1px solid rgba(0,180,255,.25)}
.p-business{background:rgba(255,107,0,.12);color:var(--orange);border:1px solid rgba(255,107,0,.25)}
.p-elite{background:rgba(251,191,36,.12);color:var(--yellow);border:1px solid rgba(251,191,36,.25)}

/* ── TABS NAV ── */
.tabs-nav{
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;overflow-x:auto;flex-shrink:0;
  scrollbar-width:none;
}
.tabs-nav::-webkit-scrollbar{display:none}
.tab-item{
  flex:1;min-width:88px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:13px 8px 11px;cursor:pointer;
  color:var(--muted);font-size:.72rem;font-weight:600;
  border-bottom:3px solid transparent;
  transition:all .2s;white-space:nowrap;
  position:relative;
}
.tab-item:hover{color:var(--white2)}
.tab-item.active{color:var(--white);border-bottom-color:var(--neon)}
.tab-item.active .ticon{filter:drop-shadow(0 0 6px var(--neon))}
.ticon{font-size:1.35rem;line-height:1}
.tlabel{letter-spacing:.2px}

/* ── PAGE CONTENT ── */
.main-area{flex:1;overflow-y:auto;padding:18px}

/* ── PAGE HEADER (sub) ── */
.page-head{margin-bottom:18px}
.page-head .ptitle{font-size:1.05rem;font-weight:800}
.page-head .psub{font-size:.74rem;color:var(--muted);margin-top:2px}
.page-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rs);font-size:.82rem;font-weight:700;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-neon{background:linear-gradient(135deg,var(--neon2),var(--neon));color:#000;box-shadow:0 0 16px var(--neon-g)}
.btn-neon:hover{box-shadow:0 0 24px rgba(0,180,255,.25)}
.btn-orange{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;box-shadow:0 0 16px var(--orange-g)}
.btn-orange:hover{box-shadow:0 0 24px rgba(255,107,0,.25)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--muted)}
.btn-ghost:hover{border-color:var(--neon);color:var(--neon)}
.btn-success{background:var(--success);color:#000;font-weight:700}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:6px 13px;font-size:.77rem}
.btn-xs{padding:4px 9px;font-size:.7rem}

/* ── STATS GRID (style MARATHON) ── */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:22px}
@media(min-width:640px){.stats-grid{grid-template-columns:repeat(4,1fr)}}
.stat-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:20px 16px;
  position:relative;overflow:hidden;min-height:120px;
  display:flex;flex-direction:column;justify-content:space-between;
}
.sc-top{position:absolute;top:0;left:0;right:0;height:3px}
.sc-ico{font-size:1.6rem;margin-bottom:14px;display:block}
.sc-val{font-family:'Playfair Display',serif;font-size:2.1rem;font-weight:900;letter-spacing:-1px;line-height:1;margin-bottom:4px}
.sc-lbl{font-size:.65rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1.2px}
.v-neon{background:linear-gradient(90deg,var(--neon),#60efff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.v-orange{background:linear-gradient(90deg,var(--orange),var(--orange2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.v-green{background:linear-gradient(90deg,var(--success),#00e5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.v-white{color:var(--white)}
.v-yellow{color:var(--yellow)}
.v-red{color:var(--danger)}
.v-purple{background:linear-gradient(90deg,#a78bfa,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.card-header{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:.85rem;font-weight:700}
.card-body{padding:16px}
.section-title{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:11px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── FILTER ── */
.filter-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:11px 15px;margin-bottom:14px}
.filter-label{font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{background:var(--card2);border:1px solid var(--border2);border-radius:20px;padding:4px 12px;font-size:.75rem;cursor:pointer;color:var(--muted);transition:all .15s}
.chip:hover{border-color:var(--neon);color:var(--white)}
.chip.active{background:var(--neon-g);border-color:var(--neon);color:var(--neon);font-weight:600}

/* ── SEARCH ── */
.search-box{position:relative;flex:1;min-width:140px}
.search-box input{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rs);padding:9px 12px 9px 32px;color:var(--white);font-size:.82rem;outline:none;width:100%;transition:all .2s}
.search-box input::placeholder{color:var(--muted)}
.search-box input:focus{border-color:var(--neon);box-shadow:0 0 0 2px var(--neon-g)}
.sico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.82rem}

/* ── TABLE ── */
.nx-table{width:100%;border-collapse:collapse}
.nx-table th{text-align:left;padding:9px 13px;font-size:.64rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border)}
.nx-table td{padding:11px 13px;font-size:.8rem;border-bottom:1px solid var(--border);vertical-align:middle}
.nx-table tr:last-child td{border-bottom:none}
.nx-table tr:hover td{background:var(--card2)}

/* ── PILLS ── */
.pill{display:inline-block;padding:3px 10px;border-radius:10px;font-size:.66rem;font-weight:700;border:1px solid}
.pill-active{background:rgba(0,255,136,.08);border-color:rgba(0,255,136,.2);color:var(--success)}
.pill-pending{background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.2);color:var(--yellow)}
.pill-rejected{background:rgba(255,51,102,.08);border-color:rgba(255,51,102,.2);color:var(--danger)}
.pill-free{background:rgba(107,114,128,.08);border-color:rgba(107,114,128,.2);color:var(--muted)}
.pill-starter{background:rgba(0,180,255,.08);border-color:rgba(0,180,255,.2);color:var(--neon)}
.pill-business{background:rgba(255,107,0,.08);border-color:rgba(255,107,0,.2);color:var(--orange)}
.pill-elite{background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.2);color:var(--yellow)}

/* ── MODAL ── */
.moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(5px);z-index:999;align-items:center;justify-content:center;padding:20px}
.moverlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:490px;padding:22px;display:flex;flex-direction:column;gap:15px;max-height:90vh;overflow-y:auto;position:relative}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:16px 16px 0 0;background:linear-gradient(90deg,var(--neon),var(--orange))}
.modal-header{display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font-size:.95rem;font-weight:800}
.modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;padding:4px 7px;border-radius:5px}
.modal-close:hover{color:var(--white);background:var(--card2)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;padding-top:4px}

/* ── FORM ── */
.fgroup{display:flex;flex-direction:column;gap:6px}
.fgroup label{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.fgroup input,.fgroup textarea,.fgroup select{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rs);padding:10px 13px;color:var(--white);font-size:.875rem;outline:none;transition:border-color .15s;width:100%}
.fgroup input::placeholder,.fgroup textarea::placeholder{color:var(--muted)}
.fgroup input:focus,.fgroup textarea:focus,.fgroup select:focus{border-color:var(--neon);box-shadow:0 0 0 2px var(--neon-g)}
.fgroup textarea{min-height:95px;resize:vertical}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── PROGRESS ── */
.progress-wrap{display:none}
.progress-wrap.show{display:block}
.pbar{height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;margin-bottom:5px}
.pfill{height:100%;background:linear-gradient(90deg,var(--neon),var(--orange));width:0%;transition:width .3s}
.pmsg{font-size:.76rem;color:var(--muted);text-align:center}

/* ── CONTACT CARD ── */
.ccard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:all .2s}
.ccard:hover{border-color:rgba(0,180,255,.25);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.4)}
.ccard-av{width:36px;height:36px;border-radius:9px;flex-shrink:0;background:linear-gradient(135deg,var(--neon2),var(--orange));display:flex;align-items:center;justify-content:center;font-size:.95rem;font-weight:800;color:#000}

/* ── BAR CHART ── */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-lbl{font-size:.73rem;color:var(--white2);width:125px;flex-shrink:0;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:20px;background:var(--bg2);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--neon2),var(--orange));transition:width .8s ease}
.bar-val{font-size:.73rem;color:var(--muted);width:34px;flex-shrink:0;font-weight:600}

/* ── PLAN CARD ── */
.plan-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;display:flex;flex-direction:column;gap:13px;transition:all .2s}
.plan-card:hover{border-color:var(--border2);box-shadow:0 8px 28px rgba(0,0,0,.4)}
.plan-card.featured{border-color:rgba(0,180,255,.25)}
.plan-card.featured::before{content:'';display:block;height:2px;margin:-20px -20px 20px;background:linear-gradient(90deg,var(--neon),var(--orange))}
.plan-price{display:flex;align-items:baseline;gap:4px}
.plan-price .amount{font-size:2rem;font-weight:900;letter-spacing:-1px}
.plan-price .per{font-size:.78rem;color:var(--muted)}
.plan-features{list-style:none;display:flex;flex-direction:column;gap:7px}
.plan-features li{font-size:.8rem;color:var(--white2);display:flex;align-items:center;gap:7px}
.plan-features li .fi{color:var(--success);font-size:.72rem}

/* ── EMPTY ── */
.empty-state{text-align:center;padding:55px 24px}
.empty-state .eico{font-size:2.8rem;margin-bottom:12px;display:block}
.empty-state p{color:var(--muted);font-size:.86rem}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--border2);border-radius:9px;padding:9px 20px;font-size:.82rem;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;box-shadow:0 8px 28px rgba(0,0,0,.6);white-space:nowrap}

/* ── ACTIONS RAPIDES (grid icônes) ── */
.quick-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.quick-item{
  display:flex;flex-direction:column;gap:8px;
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:16px;text-decoration:none;transition:all .2s;
}
.quick-item:hover{border-color:rgba(0,180,255,.3);transform:translateY(-2px)}
.quick-item .qico{font-size:1.6rem}
.quick-item .qtitle{font-size:.85rem;font-weight:700;color:var(--white)}
.quick-item .qsub{font-size:.72rem;color:var(--muted)}

@media(max-width:480px){
  .brand-text{font-size:1.1rem}
  .tab-item{font-size:.65rem;min-width:72px}
  .ticon{font-size:1.2rem}
  .frow{grid-template-columns:1fr}
  .bar-lbl{width:80px}
}
</style>

<script>
(function(){
  var s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
  s.async = true;
  s.onload = function(){ if(window.emailjs) emailjs.init("fNyhiux6zn4u2CtRj"); };
  document.head.appendChild(s);
})();
</script>
{% block head %}{% endblock %}
</head>
<body>
<div class="app-layout">

  <!-- HEADER -->
  <header class="app-header">
    <div class="brand">
      <div class="brand-mark">N</div>
      <div class="brand-text">Nex<span class="a">Link</span></div>
    </div>
    <div class="header-right">
      <span class="plan-badge" id="planBadge">—</span>
      <a href="/logout" class="btn btn-ghost btn-sm">← Quitter</a>
    </div>
  </header>

  <!-- TABS NAV -->
  <nav class="tabs-nav">
    <div class="tab-item" data-href="/dashboard">
      <span class="ticon">🏠</span><span class="tlabel">Dashboard</span>
    </div>
    <div class="tab-item" data-href="/contacts">
      <span class="ticon">👥</span><span class="tlabel">Contacts</span>
    </div>
    <div class="tab-item" data-href="/tags">
      <span class="ticon">🏷️</span><span class="tlabel">Tags</span>
    </div>
    <div class="tab-item" data-href="/history">
      <span class="ticon">📨</span><span class="tlabel">Historique</span>
    </div>
    <div class="tab-item" data-href="/import">
      <span class="ticon">📥</span><span class="tlabel">Import</span>
    </div>
    <div class="tab-item" data-href="/stats">
      <span class="ticon">📊</span><span class="tlabel">Stats</span>
    </div>
    <div class="tab-item" data-href="/plans">
      <span class="ticon">💰</span><span class="tlabel">Plans</span>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="main-area">
    <div class="page-head">
      <div class="ptitle">{% block page_title %}{% endblock %}</div>
      <div class="psub">{% block page_sub %}{% endblock %}</div>
      <div class="page-actions">{% block topbar_actions %}{% endblock %}</div>
    </div>
    {% block content %}{% endblock %}
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
function toast(msg, dur) {
  dur = dur || 2400;
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.style.opacity = '0'; }, dur);
}
function openModal(id) {
  var el = document.getElementById(id);
  if (el) el.classList.add('open');
}
function closeModal(id) {
  var el = document.getElementById(id);
  if (el) el.classList.remove('open');
}
function copyText(txt) {
  if (navigator.clipboard) { navigator.clipboard.writeText(txt).catch(function(){}); }
  toast('✅ Copié !');
}

// Tabs active + click
document.querySelectorAll('.tab-item[data-href]').forEach(function(el) {
  var href = el.dataset.href;
  var cp = window.location.pathname;
  if (cp === href || (href.length > 1 && cp.indexOf(href) === 0)) {
    el.classList.add('active');
  }
  el.addEventListener('click', function() {
    window.location.href = href;
  });
});

// Modal close handlers
document.querySelectorAll('.modal-close, [data-close]').forEach(function(b) {
  b.addEventListener('click', function() {
    var id = b.getAttribute('data-close');
    if (!id) {
      var ov = b.closest('.moverlay');
      if (ov) id = ov.id;
    }
    if (id) closeModal(id);
  });
});
document.querySelectorAll('.moverlay').forEach(function(ov) {
  ov.addEventListener('click', function(e) {
    if (e.target === ov) closeModal(ov.id);
  });
});

// Header plan badge
(function() {
  try {
    var planLimit = {% if plan_limit is defined %}{{ plan_limit }}{% else %}10{% endif %};
    var planName  = "{% if plan %}{{ plan.name }}{% else %}Gratuit{% endif %}";
    var planKey   = "{% if plan_key %}{{ plan_key }}{% else %}free{% endif %}";

    var pb = document.getElementById('planBadge');
    if (pb) {
      pb.textContent = planName + (planLimit === -1 ? ' · ∞' : ' · ' + planLimit + '/j');
      pb.className = 'plan-badge p-' + planKey;
    }
  } catch(err) {
    console.warn('NexLink base init:', err);
  }
})();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
